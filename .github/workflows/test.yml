name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: api_test
          POSTGRES_USER: api
          POSTGRES_PASSWORD: api
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U api -d api_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      JWT_SECRET: test-jwt-secret
      DATABASE_TYPE: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: api_test
      DATABASE_USER: api
      DATABASE_PASSWORD: api
      DATABASE_SYNCHRONIZE: "true"
      SEED_ADMIN: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn test:unit
      - run: yarn test:integration
      - run: yarn test:e2e
