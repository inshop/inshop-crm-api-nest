services:
  db:
    image: postgres
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data:rw
    ports:
      - ${DATABASE_PORT}:5432

  db-test:
    image: postgres
    environment:
      - POSTGRES_DB=${DATABASE_TEST_NAME:-api_test}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - db-test-data:/var/lib/postgresql/data:rw
    ports:
      - ${DATABASE_TEST_PORT:-5433}:5432

volumes:
  db-data: {}
  db-test-data: {}
