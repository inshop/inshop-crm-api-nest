name: inshop-crm-prod

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-api}
      POSTGRES_USER: ${DATABASE_USER:-api}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-api}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:-api} -d ${DATABASE_NAME:-api}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/inshop/inshop-crm-api-nest:${API_IMAGE_TAG:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_HOST: db
      DATABASE_SYNCHRONIZE: ${DATABASE_SYNCHRONIZE:-false}
      SEED_ADMIN: ${SEED_ADMIN:-false}
    ports:
      - "${PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  admin:
    image: ghcr.io/inshop/inshop-crm-admin-next:${ADMIN_IMAGE_TAG:-latest}
    env_file:
      - path: ../inshop-crm-admin-next/.env.local
        required: false
    environment:
      BACKEND_BASE_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
